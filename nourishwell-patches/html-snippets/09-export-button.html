<!--
  SNIPPET 09 — Export Weekly Report button on Record Today

  FIND (dashboard.html, around line 323, inside the Record Today page-header):
    <div class="page-header"><div class="page-title">Record <em>Today</em></div>
      <div class="page-date" id="today-date"></div>
      <div class="date-nav">...</div>
    </div>

  Change the outer div to have flex:space-between and add an Export button.

  REPLACE the whole page-header block (line 323-324 area) with:
-->

<div class="page-header"
     style="display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px">
  <div>
    <div class="page-title">Record <em>Today</em></div>
    <div class="page-date" id="today-date"></div>
    <div class="date-nav">
      <button class="date-nav-btn" onclick="changeDate(-1)" aria-label="Previous day">←</button>
      <label for="diary-date-picker" class="sr-only">Select diary date</label>
      <input type="date" id="diary-date-picker"
             onchange="loadDateDiary(this.value)"
             aria-label="Select date">
      <button class="date-nav-btn" onclick="changeDate(1)" aria-label="Next day">→</button>
      <button class="date-nav-btn" onclick="goToday()"
              style="font-size:10px;width:auto;padding:0 10px;font-family:'JetBrains Mono',monospace"
              aria-label="Go to today">Today</button>
    </div>
  </div>

  <!-- NEW: Export Weekly Report button -->
  <button type="button"
          onclick="exportWeeklyReportCSV()"
          aria-label="Download last 7 days of diary data as CSV"
          style="display:inline-flex;align-items:center;gap:6px;
                 padding:9px 16px;background:var(--white);
                 border:1px solid var(--border);border-radius:10px;
                 font-family:'Bricolage Grotesque',sans-serif;
                 font-size:12px;font-weight:600;color:var(--ink);
                 cursor:pointer;transition:all .2s"
          onmouseover="this.style.borderColor='var(--teal)';this.style.color='var(--teal)'"
          onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--ink)'">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
      <path d="M7 1v8M4 6l3 3 3-3M2 12h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Export week
  </button>
</div>
