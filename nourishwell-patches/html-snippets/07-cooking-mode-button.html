<!--
  SNIPPET 07 — Cook Mode button in recipe detail drawer

  Find this line in dashboard.html (around line 941, inside openRecipeDetail):

    <button id="detail-fav-btn" data-id="${id}" onclick="toggleFavFromDetail(this)"
            style="padding:9px 20px;background:${favourites.has(id)?'#1e6b5e':'#0a1410'};
            color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer">
      ${favourites.has(id)?'❤️ Saved':'🤍 Save'}
    </button>

  Just BEFORE that <button>, add a new button that starts cooking mode.
  Replace the entire footer's inner content with:
-->

<span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#6b8878">${r.kcal} kcal · ${r.cost} · ${r.rating}</span>

<div style="display:flex;gap:8px">
  <!-- NEW: Cook Mode button (patch.js → openCookingMode) -->
  <button onclick="openCookingMode('${id}')"
          aria-label="Start step-by-step cooking mode for ${r.name}"
          style="padding:9px 18px;background:transparent;color:#1e6b5e;
                 border:1.5px solid #1e6b5e;border-radius:8px;
                 font-family:'Bricolage Grotesque',sans-serif;
                 font-size:12px;font-weight:600;cursor:pointer;
                 display:inline-flex;align-items:center;gap:6px;
                 transition:all .2s"
          onmouseover="this.style.background='#e8f4f2'"
          onmouseout="this.style.background='transparent'">
    <span aria-hidden="true">👨‍🍳</span> Cook
  </button>
  <button id="detail-fav-btn" data-id="${id}" onclick="toggleFavFromDetail(this)"
          aria-label="${favourites.has(id) ? 'Remove from favourites' : 'Save to favourites'}"
          style="padding:9px 20px;background:${favourites.has(id)?'#1e6b5e':'#0a1410'};
                 color:#fff;border:none;border-radius:8px;
                 font-family:'Bricolage Grotesque',sans-serif;
                 font-size:12px;font-weight:600;cursor:pointer">
    ${favourites.has(id)?'❤️ Saved':'🤍 Save'}
  </button>
</div>
